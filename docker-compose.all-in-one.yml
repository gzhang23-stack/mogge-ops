services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mogge-ops-app
    env_file:
      - ./deploy/.env.production
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data:/app/data
