name: Deploy Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.TENCENT_SSH_KEY }}" > ~/.ssh/tencent_deploy_key
          chmod 600 ~/.ssh/tencent_deploy_key
          ssh-keyscan -H "${{ secrets.TENCENT_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload repository snapshot to Tencent CVM
        run: |
          git archive --format=tar HEAD | ssh -i ~/.ssh/tencent_deploy_key "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" "mkdir -p /opt/mogge-ops && tar -xf - -C /opt/mogge-ops"

      - name: Deploy frontend on Tencent CVM
        run: |
          ssh -i ~/.ssh/tencent_deploy_key "${{ secrets.TENCENT_USER }}@${{ secrets.TENCENT_HOST }}" <<'EOF'
          set -e
          cd /opt/mogge-ops/frontend
          printf 'NEXT_PUBLIC_API_BASE=/api\n' > .env.production
          rm -rf out .next
          npm ci
          npm run build

          pkill -f "serve -s /opt/mogge-ops/frontend/out" || true
          nohup npx serve -s /opt/mogge-ops/frontend/out -l 3000 --single > /opt/mogge-ops/frontend/frontend.log 2>&1 &
          EOF
